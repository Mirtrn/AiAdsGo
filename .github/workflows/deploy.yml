name: Build and Deploy to GCP

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'  # 匹配版本标签，如 v3.0.0
  workflow_dispatch:

env:
  # GitHub Container Registry
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  # GCP Configuration (MustKnowV1.md #30)
  GCP_PROJECT_ID: gen-lang-client-0944935873
  GCP_REGION: asia-northeast1
  GCP_AR_REPO: autobb
  GCP_SERVICE_NAME: autobb
  # Artifact Registry完整路径
  GCP_AR_IMAGE: asia-northeast1-docker.pkg.dev/gen-lang-client-0944935873/autobb/autobb

jobs:
  # ============================================
  # Job 1: 构建和测试
  # ============================================
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行类型检查
        run: npm run type-check || npx tsc --noEmit

      - name: 运行ESLint
        run: npm run lint

      - name: 构建项目
        run: npm run build
        env:
          NODE_ENV: production

      - name: 运行测试 (如果有)
        run: npm test || echo "No tests configured"
        continue-on-error: true

  # ============================================
  # Job 2: 单次构建，推送到GHCR和Artifact Registry
  # ============================================
  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置变量
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false

      # 登录 GitHub Container Registry
      - name: 登录GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 登录 GCP Artifact Registry
      - name: 认证GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 配置Docker认证到Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # 生成镜像标签
      - name: 生成镜像标签
        id: tags
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          # GHCR标签
          GHCR_TAGS="${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest"
          GHCR_TAGS="${GHCR_TAGS},${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${SHORT_SHA}"

          # Artifact Registry标签
          AR_TAGS="${{ env.GCP_AR_IMAGE }}:latest"
          AR_TAGS="${AR_TAGS},${{ env.GCP_AR_IMAGE }}:${SHORT_SHA}"

          # 如果是版本标签，添加版本号
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            GHCR_TAGS="${GHCR_TAGS},${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${VERSION}"
            AR_TAGS="${AR_TAGS},${{ env.GCP_AR_IMAGE }}:${VERSION}"
          fi

          # 合并所有标签
          ALL_TAGS="${GHCR_TAGS},${AR_TAGS}"
          echo "tags=${ALL_TAGS}" >> $GITHUB_OUTPUT

          echo "📦 将推送以下标签:"
          echo "${ALL_TAGS}" | tr ',' '\n'

      # 单次构建，推送到两个Registry
      - name: 构建并推送Docker镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: 输出镜像信息
        run: |
          echo "✅ 镜像已推送到两个Registry"
          echo ""
          echo "📦 GHCR:"
          echo "   - ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-latest"
          echo "   - ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:prod-${{ steps.vars.outputs.short_sha }}"
          echo ""
          echo "📦 Artifact Registry:"
          echo "   - ${{ env.GCP_AR_IMAGE }}:latest"
          echo "   - ${{ env.GCP_AR_IMAGE }}:${{ steps.vars.outputs.short_sha }}"

  # ============================================
  # Job 3: 部署到Cloud Run
  # ============================================
  deploy-to-cloud-run:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 认证GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 设置gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 部署到Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.GCP_SERVICE_NAME }} \
            --image=${{ env.GCP_AR_IMAGE }}:latest \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=80 \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=300 \
            --set-secrets="\
              DATABASE_URL=DATABASE_URL:latest,\
              JWT_SECRET=JWT_SECRET:latest,\
              ENCRYPTION_KEY=ENCRYPTION_KEY:latest,\
              REDIS_URL=REDIS_URL:latest,\
              NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest,\
              DEFAULT_ADMIN_PASSWORD=DEFAULT_ADMIN_PASSWORD:latest,\
              NEXT_PUBLIC_CAPTCHA_ENABLED=NEXT_PUBLIC_CAPTCHA_ENABLED:latest,\
              NEXT_PUBLIC_TURNSTILE_SITE_KEY=NEXT_PUBLIC_TURNSTILE_SITE_KEY:latest,\
              TURNSTILE_SECRET_KEY=TURNSTILE_SECRET_KEY:latest,\
              NODE_ENV=NODE_ENV:latest,\
              TZ=TZ:latest" \
            --quiet

      - name: 获取服务URL并验证
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.GCP_SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "✅ 部署成功!"
          echo "🌐 服务URL: $SERVICE_URL"

          # 等待服务启动并健康检查
          echo "🔍 验证服务健康状态..."
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/api/health" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ 健康检查通过"
          else
            echo "⚠️ 健康检查返回: $HTTP_CODE (服务可能仍在启动中)"
          fi

# ============================================
# 部署说明
# ============================================
#
# 🚀 优化后的部署流程 (3个Jobs):
#    build-and-test → build-and-push → deploy-to-cloud-run
#
# ⚡ 优化点:
#    - 单次构建，同时推送到GHCR和Artifact Registry
#    - 节省约3-5分钟构建时间
#    - 保证两个仓库镜像完全一致
#
# 📋 GitHub Secrets 配置要求:
#
# 1. GCP_SA_KEY (必需)
#    - 内容: GCP服务账号JSON密钥的完整内容
#    - 服务账号: codex-dev@gen-lang-client-0944935873.iam.gserviceaccount.com
#    - 获取方式: 复制 secrets/gcp_autoads_dev.json 文件内容
#    - 所需权限:
#      * Artifact Registry Writer (roles/artifactregistry.writer)
#      * Cloud Run Admin (roles/run.admin)
#      * Service Account User (roles/iam.serviceAccountUser)
#      * Secret Manager Secret Accessor (roles/secretmanager.secretAccessor)
#
# 2. Secret Manager 中已配置的密钥 (2025-12-15):
#    ✅ DATABASE_URL, JWT_SECRET, ENCRYPTION_KEY, REDIS_URL
#    ✅ NEXT_PUBLIC_APP_URL, DEFAULT_ADMIN_PASSWORD, NODE_ENV, TZ
#    ✅ NEXT_PUBLIC_CAPTCHA_ENABLED, NEXT_PUBLIC_TURNSTILE_SITE_KEY, TURNSTILE_SECRET_KEY
#
# 3. 如需额外功能，请添加以下密钥到Secret Manager:
#    - GEMINI_API_KEY, GOOGLE_ADS_*, GOOGLE_CLIENT_*
#
# 🔗 相关资源:
# - GHCR: ghcr.io/xxrenzhe/autobb
# - Artifact Registry: asia-northeast1-docker.pkg.dev/gen-lang-client-0944935873/autobb
# - Cloud Run: autobb (asia-northeast1)
# - Secret Manager: https://console.cloud.google.com/security/secret-manager?project=gen-lang-client-0944935873
