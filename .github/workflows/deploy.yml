name: Build and Deploy to GCP

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'  # 匹配版本标签，如 v3.0.0
  workflow_dispatch:

env:
  # GitHub Container Registry
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

  # GCP Configuration (MustKnowV1.md #30)
  GCP_PROJECT_ID: gen-lang-client-0944935873
  GCP_REGION: asia-northeast1
  GCP_AR_REPO: autobb
  GCP_SERVICE_NAME: autobb
  # Artifact Registry完整路径
  GCP_AR_IMAGE: asia-northeast1-docker.pkg.dev/gen-lang-client-0944935873/autobb/autobb

jobs:
  # ============================================
  # Job 1: 构建和测试
  # ============================================
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行类型检查
        run: npm run type-check || npx tsc --noEmit

      - name: 运行ESLint
        run: npm run lint

      - name: 构建项目
        run: npm run build
        env:
          NODE_ENV: production

      - name: 运行测试 (如果有)
        run: npm test || echo "No tests configured"
        continue-on-error: true

  # ============================================
  # Job 2: 构建Docker镜像并推送到GHCR
  # ============================================
  build-and-push-ghcr:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置变量
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false

      - name: 登录GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main分支推送: prod-latest 和 prod-[commitid]
            type=raw,value=prod-latest,enable={{is_default_branch}}
            type=sha,prefix=prod-,format=short,enable={{is_default_branch}}
            # tag推送 (如v3.0.0): prod-[tag] 和 prod-[commitid]
            type=match,pattern=v(.*),group=1,prefix=prod-,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=prod-,format=short,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: 构建并推送Docker镜像到GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ============================================
  # Job 3: 推送镜像到GCP Artifact Registry
  # ============================================
  push-to-artifact-registry:
    needs: build-and-push-ghcr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # 用于Workload Identity Federation

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 认证GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 设置gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 配置Docker认证到Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: 构建并推送镜像到Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.GCP_AR_IMAGE }}:latest
            ${{ env.GCP_AR_IMAGE }}:${{ needs.build-and-push-ghcr.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: 输出镜像信息
        run: |
          echo "✅ 镜像已推送到 Artifact Registry"
          echo "📦 镜像: ${{ env.GCP_AR_IMAGE }}:latest"
          echo "📦 镜像: ${{ env.GCP_AR_IMAGE }}:${{ needs.build-and-push-ghcr.outputs.short_sha }}"

  # ============================================
  # Job 4: 部署到Cloud Run (从Secret Manager获取环境变量)
  # ============================================
  deploy-to-cloud-run:
    needs: push-to-artifact-registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 认证GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 设置gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: 部署到Cloud Run
        id: deploy
        run: |
          gcloud run deploy ${{ env.GCP_SERVICE_NAME }} \
            --image=${{ env.GCP_AR_IMAGE }}:latest \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=80 \
            --cpu=1 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=3 \
            --timeout=300 \
            --set-secrets="\
              DATABASE_URL=DATABASE_URL:latest,\
              JWT_SECRET=JWT_SECRET:latest,\
              ENCRYPTION_KEY=ENCRYPTION_KEY:latest,\
              REDIS_URL=REDIS_URL:latest,\
              NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest,\
              DEFAULT_ADMIN_PASSWORD=DEFAULT_ADMIN_PASSWORD:latest,\
              NEXT_PUBLIC_CAPTCHA_ENABLED=NEXT_PUBLIC_CAPTCHA_ENABLED:latest,\
              NEXT_PUBLIC_TURNSTILE_SITE_KEY=NEXT_PUBLIC_TURNSTILE_SITE_KEY:latest,\
              TURNSTILE_SECRET_KEY=TURNSTILE_SECRET_KEY:latest,\
              NODE_ENV=NODE_ENV:latest,\
              TZ=TZ:latest" \
            --quiet

      - name: 获取服务URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.GCP_SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "✅ 部署成功!"
          echo "🌐 服务URL: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: 验证服务健康状态
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.GCP_SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "🔍 验证服务健康状态..."
          # 等待服务启动
          sleep 10
          # 健康检查 (允许失败，不阻塞部署)
          curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/api/health" || echo "健康检查跳过"

# ============================================
# 部署说明
# ============================================
#
# 📋 GitHub Secrets 配置要求:
#
# 1. GCP_SA_KEY (必需)
#    - 内容: GCP服务账号JSON密钥的完整内容
#    - 服务账号: codex-dev@gen-lang-client-0944935873.iam.gserviceaccount.com
#    - 获取方式: 复制 secrets/gcp_autoads_dev.json 文件内容
#    - 所需权限:
#      * Artifact Registry Writer (roles/artifactregistry.writer)
#      * Cloud Run Admin (roles/run.admin)
#      * Service Account User (roles/iam.serviceAccountUser)
#      * Secret Manager Secret Accessor (roles/secretmanager.secretAccessor)
#
# 2. Secret Manager 中已配置的密钥 (2025-12-15):
#    ✅ DATABASE_URL: PostgreSQL连接字符串
#    ✅ JWT_SECRET: JWT签名密钥
#    ✅ ENCRYPTION_KEY: 数据加密密钥
#    ✅ REDIS_URL: Redis连接字符串
#    ✅ NEXT_PUBLIC_APP_URL: 应用公开URL
#    ✅ DEFAULT_ADMIN_PASSWORD: 默认管理员密码
#    ✅ NEXT_PUBLIC_CAPTCHA_ENABLED: 是否启用验证码
#    ✅ NEXT_PUBLIC_TURNSTILE_SITE_KEY: Turnstile站点密钥
#    ✅ TURNSTILE_SECRET_KEY: Turnstile密钥
#    ✅ NODE_ENV: 运行环境
#    ✅ TZ: 时区设置
#
# 3. 如需额外功能，请添加以下密钥到Secret Manager:
#    - GEMINI_API_KEY: Gemini API密钥 (AI生成)
#    - GOOGLE_ADS_DEVELOPER_TOKEN: Google Ads开发者令牌
#    - GOOGLE_ADS_CLIENT_ID: Google Ads OAuth客户端ID
#    - GOOGLE_ADS_CLIENT_SECRET: Google Ads OAuth客户端密钥
#    - GOOGLE_CLIENT_ID: Google OAuth登录客户端ID
#    - GOOGLE_CLIENT_SECRET: Google OAuth登录客户端密钥
#
# 🚀 部署流程:
# 1. 推送代码到main分支或创建版本标签
# 2. GitHub Actions自动:
#    a. 运行构建和测试
#    b. 推送镜像到GitHub Container Registry (ghcr.io)
#    c. 推送镜像到GCP Artifact Registry
#    d. 部署到Cloud Run并从Secret Manager注入环境变量
#
# 🔗 相关资源:
# - Artifact Registry: asia-northeast1-docker.pkg.dev/gen-lang-client-0944935873/autobb
# - Cloud Run服务: autobb (asia-northeast1)
# - Secret Manager: https://console.cloud.google.com/security/secret-manager?project=gen-lang-client-0944935873
#
# 📝 添加新密钥到Secret Manager的命令:
# gcloud secrets create SECRET_NAME --project=gen-lang-client-0944935873
# echo -n "secret_value" | gcloud secrets versions add SECRET_NAME --data-file=- --project=gen-lang-client-0944935873
