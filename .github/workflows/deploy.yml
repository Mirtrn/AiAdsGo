name: Build Production Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'  # 匹配版本标签，如 v3.0.0
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================
  # Job 1: 构建和测试
  # ============================================
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 运行类型检查
        run: npm run type-check || npx tsc --noEmit

      - name: 运行ESLint
        run: npm run lint

      - name: 构建项目
        run: npm run build
        env:
          NODE_ENV: production

      - name: 运行测试 (如果有)
        run: npm test || echo "No tests configured"
        continue-on-error: true

  # ============================================
  # Job 2: 构建和推送Docker镜像
  # ============================================
  build-and-push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout代码
        uses: actions/checkout@v4

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main分支推送: prod-latest 和 prod-[commitid]
            type=raw,value=prod-latest,enable={{is_default_branch}}
            type=sha,prefix=prod-,format=short,enable={{is_default_branch}}
            # tag推送 (如v3.0.0): prod-[tag] 和 prod-[commitid]
            type=match,pattern=v(.*),group=1,prefix=prod-,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=prod-,format=short,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: 构建并推送Docker镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ============================================
  # 部署说明（单容器架构）
  # ============================================
  # 镜像构建完成后，需要手动拉取并部署到ClawCloud
  #
  # 🏗️ 架构说明：
  # - 单容器集成：Nginx + Next.js + Scheduler
  # - 进程管理：使用 supervisord 管理所有服务
  # - 对外端口：80（Nginx监听）
  # - 内部端口：3000（Next.js）
  # - 定时任务：调度器自动运行
  #
  # 手动部署步骤：
  # 1. SSH登录到ClawCloud服务器
  # 2. 拉取最新镜像：
  #    docker pull ghcr.io/xxrenzhe/autobb:prod-latest
  #    或指定版本：
  #    docker pull ghcr.io/xxrenzhe/autobb:prod-3.0.0
  # 3. 重启服务：
  #    docker stop autoads && docker rm autoads
  #    docker run -d --name autoads \
  #      -p 80:80 \
  #      -v /path/to/data:/app/data \
  #      -v /path/to/logs:/app/logs \
  #      --env-file .env.prod \
  #      ghcr.io/xxrenzhe/autobb:prod-latest
  # 4. 验证服务：
  #    docker logs -f autoads
  #    curl http://localhost/api/health
  # 5. 清理旧镜像：
  #    docker system prune -f
  #
  # 可用的镜像标签：
  # - prod-latest: main分支最新版本
  # - prod-[commitid]: 特定commit版本（如 prod-a1b2c3d）
  # - prod-[version]: 特定发布版本（如 prod-3.0.0）
  #
  # 注意事项：
  # - 确保服务器防火墙开放80端口
  # - 数据持久化需要挂载 /app/data 目录
  # - 日志持久化需要挂载 /app/logs 目录
  # - 环境变量通过 .env.prod 文件注入
