name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to 43.160.192.15
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 43.160.192.15
          username: ubuntu
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: 25m
          script: |
            set -e
            cd /home/ubuntu/autobb

            echo "=== 拉取最新代码 ==="
            git pull origin main

            echo "=== 重新构建镜像 ==="
            sudo docker build -t autoads:staging .

            echo "=== 重启容器 ==="
            sudo docker-compose -f docker-compose.staging.yml up -d

            echo "=== 等待健康检查 ==="
            sleep 15
            STATUS=$(sudo docker inspect --format='{{.State.Health.Status}}' autoads_staging 2>/dev/null || echo "unknown")
            echo "容器状态: $STATUS"

            echo "=== 验证可访问 ==="
            curl -sf http://localhost:8080/ > /dev/null && echo "✅ 首页 200" || echo "❌ 首页访问失败"

            echo "=== 部署完成 ==="
