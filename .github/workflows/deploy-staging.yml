name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 自动部署到测试服务器
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 部署到测试服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ubuntu
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -e
            LOG=/tmp/deploy_staging.log
            echo "[START $(date)]" >> $LOG

            cd /home/ubuntu/autobb

            echo "拉取最新代码..." | tee -a $LOG
            git pull origin main >> $LOG 2>&1

            echo "构建 Docker 镜像..." | tee -a $LOG
            sudo docker build -t autoads:staging . >> $LOG 2>&1

            echo "重启容器..." | tee -a $LOG
            sudo docker compose -f docker-compose.staging.yml down >> $LOG 2>&1
            sudo docker compose -f docker-compose.staging.yml up -d >> $LOG 2>&1

            echo "清理旧镜像..." | tee -a $LOG
            sudo docker image prune -af >> $LOG 2>&1

            echo "[DONE $(date)]" >> $LOG
            echo "✅ 测试服务器部署完成"
