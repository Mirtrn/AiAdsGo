version: '3.9'

services:
  autoads:
    image: autoads:single
    container_name: autoads
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "80:80"
    environment:
      # 数据库 - 使用 PostgreSQL
      DATABASE_URL: ${DATABASE_URL:-postgresql://autoads:autoads2026@postgres:5432/autoads}

      # Google Ads API
      GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN}
      GOOGLE_ADS_CLIENT_ID: ${GOOGLE_ADS_CLIENT_ID}
      GOOGLE_ADS_CLIENT_SECRET: ${GOOGLE_ADS_CLIENT_SECRET}
      GOOGLE_ADS_REFRESH_TOKEN: ${GOOGLE_ADS_REFRESH_TOKEN}
      GOOGLE_ADS_ADMIN_PASSWORD: ${GOOGLE_ADS_ADMIN_PASSWORD:-Admin@2026}

      # Google AI
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # Cloudflare Turnstile
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}

      # 环境标识
      NODE_ENV: production
      PORT: 80
      HOSTNAME: 0.0.0.0
      TZ: Asia/Shanghai
      NEXT_TELEMETRY_DISABLED: "1"

      # Redis
      REDIS_URL: redis://redis:6379
      QUEUE_SPLIT_BACKGROUND: "true"

      # 内存配置（基于16GB服务器调优）
      NODE_MAX_OLD_SPACE_SIZE_WEB: 4096
      NODE_MAX_OLD_SPACE_SIZE_SCHEDULER: 512
      NODE_MAX_OLD_SPACE_SIZE_BACKGROUND_WORKER: 1024
      NODE_MAX_OLD_SPACE_SIZE_OPENCLAW: 512

      # 队列并发
      QUEUE_GLOBAL_CONCURRENCY: 25
      QUEUE_PER_USER_CONCURRENCY: 3
      QUEUE_OFFER_EXTRACTION_CONCURRENCY: 20
      QUEUE_CLICK_FARM_CONCURRENCY: 4
      QUEUE_URL_SWAP_CONCURRENCY: 2
      CLICK_FARM_MAX_INFLIGHT: 4
      CLICK_FARM_HEAP_PRESSURE_PCT: 80
      CLICK_FARM_REQUIRE_REDIS_IN_PRODUCTION: "false"

    volumes:
      - autoads_backups:/app/data/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - postgres
      - redis
    networks:
      - autoads-network

  # PostgreSQL 数据库（主服务器使用 PostgreSQL）
  postgres:
    image: postgres:16-alpine
    container_name: autoads_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=autoads
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-autoads2026}
      - POSTGRES_DB=autoads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoads"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autoads-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: autoads_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - autoads-network

networks:
  autoads-network:
    driver: bridge

volumes:
  autoads_backups:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
